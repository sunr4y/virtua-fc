services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    env_file: .env.docker
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:bYw6gXU85Ramv6U/DPR3+esA5P0D3rK+zVixQVENh0k=
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: virtua_fc
      DB_USERNAME: virtua_fc
      DB_PASSWORD: password
      DB_SSLMODE: disable
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    restart: unless-stopped

  vite:
    build:
      context: .
      target: dev
    entrypoint: []
    command: ["sh", "-c", "npm ci && npx vite --host 0.0.0.0"]
    ports:
      - "5173:5173"
    env_file: .env.docker
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped

  horizon:
    build:
      context: .
      target: dev
    command: ["php", "artisan", "horizon"]
    env_file: .env.docker
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_KEY: base64:bYw6gXU85Ramv6U/DPR3+esA5P0D3rK+zVixQVENh0k=
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: virtua_fc
      DB_USERNAME: virtua_fc
      DB_PASSWORD: password
      DB_SSLMODE: disable
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/vendor
      - /app/node_modules
    restart: unless-stopped
